<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSC Player Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .methods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover, button:focus {
            background: var(--primary);
            transform: translateY(-2px);
            border-color: var(--primary-hover);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            position: relative;
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .debug-console {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a7f3d0;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .debug-console .error { color: #fca5a5; }
        .debug-console .warn { color: #fde047; }
        .debug-console .info { color: #93c5fd; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="container">
    <h1>TSC Player Test</h1>

    <div class="input-group">
        <label for="titleId">Title ID (Film / Series):</label>
        <input type="text" id="titleId" value="56840" placeholder="Enter ID (e.g., 56840)">
        <label for="episodeId" style="margin-top: 1rem;">Episode ID (Optional, leave blank for Film):</label>
        <input type="text" id="episodeId" value="332972" placeholder="Enter Episode ID (if applicable)">
    </div>

    <div class="methods-grid">
        <button id="btn-iframe-vixcloud" onclick="testMethod('iframe_vixcloud')">
            ▶ Play
            <span class="subtitle">Vixcloud Iframe</span>
        </button>
    </div>

    <div class="player-container" id="playerContainer">
        <!-- Player injected here -->
    </div>

    <div class="debug-console" id="debugConsole"></div>
</div>

<script>
    // Dynamically determine the proxy server URL.
    const PROXY_URL = (window.location.hostname === 'localhost' && window.location.port === '8000')
      ? 'http://localhost:8000'
      : (window.location.hostname.includes('onrender.com') 
        ? window.location.origin 
        : 'https://tsc84.onrender.com');

    // Spatial Navigation for TV Remote Controls
    // Navigation focusable elements (only Method 2 / iframe_vixcloud remains)
    const focusableIds = ['titleId', 'episodeId', 'btn-iframe-vixcloud'];
    let focusableElements = [];
    let activeFocusIdx = 0;

    function initNavigation() {
        focusableElements = focusableIds.map(id => document.getElementById(id)).filter(el => el !== null);
        focusableElements.forEach((el, idx) => {
            el.setAttribute('tabindex', idx.toString());
            el.addEventListener('focus', () => {
                activeFocusIdx = idx;
            });
        });
        if (focusableElements.length > 0) {
            focusableElements[activeFocusIdx].focus();
        }
    }

    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        const isInput = active && active.tagName === 'INPUT';
        
        // Toggle Console display with Red button (403) or 'd'
        if (e.keyCode === 403 || e.key === 'd') {
            const consoleEl = document.getElementById('debugConsole');
            if (consoleEl) {
                consoleEl.style.display = consoleEl.style.display === 'none' ? 'block' : 'none';
            }
            e.preventDefault();
            return;
        }


        // Back key blurs input to restore navigation focus
        if (e.key === 'Backspace' || e.key === 'Escape' || e.keyCode === 10009) {
            if (isInput) {
                active.blur();
                e.preventDefault();
            }
            return;
        }

        let direction = 0;
        if (isInput) {
            // Within inputs, Left/Right moves cursor; Up/Down changes element
            if (e.key === 'ArrowDown') direction = 1;
            else if (e.key === 'ArrowUp') direction = -1;
        } else {
            // On buttons, all arrow keys navigate
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') direction = 1;
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') direction = -1;
        }

        if (direction !== 0) {
            e.preventDefault();
            activeFocusIdx = (activeFocusIdx + direction + focusableElements.length) % focusableElements.length;
            focusableElements[activeFocusIdx].focus();
        }
    });

    window.addEventListener('load', () => {
        initNavigation();
    });

    const debugConsole = document.getElementById('debugConsole');
    const playerContainer = document.getElementById('playerContainer');
    
    function log(msg, type = 'info') {
        const line = document.createElement('div');
        line.className = type;
        const time = new Date().toLocaleTimeString();
        line.textContent = `[${time}] ${msg}`;
        debugConsole.appendChild(line);
        debugConsole.scrollTop = debugConsole.scrollHeight;
        console[type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'log'](msg);
    }

    async function testMethod(method) {
        debugConsole.innerHTML = '';
        playerContainer.innerHTML = '';
        const titleId = document.getElementById('titleId').value.trim();
        let episodeId = document.getElementById('episodeId').value.trim();
        
        if (!titleId) {
            log("Title ID is required", "error");
            return;
        }

        log(`Starting ${method} test for Title: ${titleId}, Episode: ${episodeId || 'N/A'}`);

        try {
            // 1. Fetch Watch Page to get Embed URL
            let watchUrl = `/proxy/it/watch/${titleId}`;
            if (episodeId) {
                watchUrl += `?episode_id=${episodeId}`;
            }
            log(`Fetching watch page: ${watchUrl}`);
            const watchRes = await fetch(PROXY_URL + watchUrl);
            const watchHtml = await watchRes.text();
            
            const dpMatch = watchHtml.match(/data-page="([^"]+)"/);
            if (!dpMatch) throw new Error("data-page not found in watch HTML");
            
            const dpRaw = dpMatch[1].replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&amp;/g, "&");
            const dp = JSON.parse(dpRaw);
            const scEmbedUrl = dp.props.embedUrl;
            
            log(`Found SC Embed URL: ${scEmbedUrl}`);

            // 2. Fetch SC Embed Page to get Vixcloud URL
            log(`Fetching SC Embed: ${scEmbedUrl}`);
            const scEmbedRes = await fetch(scEmbedUrl);
            const scEmbedHtml = await scEmbedRes.text();
            
            const iframeMatch = scEmbedHtml.match(/<iframe[^>]+src=["']([^"']+)["']/i);
            if (!iframeMatch) throw new Error("Vixcloud iframe not found in SC embed");
            
            let vixcloudUrlRaw = iframeMatch[1].replace(/&amp;/g, "&");
            log(`Found Vixcloud URL: ${vixcloudUrlRaw}`);

            // Replace proxy domain to match our active PROXY_URL
            let vixcloudUrlProxy = vixcloudUrlRaw;
            if (vixcloudUrlRaw.includes('tsc84.onrender.com')) {
                vixcloudUrlProxy = vixcloudUrlRaw.replace('https://tsc84.onrender.com', PROXY_URL);
            } else if (vixcloudUrlRaw.includes('http://localhost:8000')) {
                vixcloudUrlProxy = vixcloudUrlRaw.replace('http://localhost:8000', PROXY_URL);
            } else if (vixcloudUrlRaw.startsWith('https://vixcloud.co')) {
                vixcloudUrlProxy = vixcloudUrlRaw.replace('https://vixcloud.co', PROXY_URL + '/vixcloud');
            }
            
            log(`Proxy Vixcloud URL: ${vixcloudUrlProxy}`);

            if (method === 'iframe_vixcloud') {
                log("Method: Iframe Vixcloud -> Inserting Iframe", "info");
                // Need to use the real vixcloud.co URL for direct iframe
                let realVixcloudUrl = vixcloudUrlRaw;
                if (realVixcloudUrl.includes('tsc84.onrender.com/vixcloud')) {
                     realVixcloudUrl = realVixcloudUrl.replace('https://tsc84.onrender.com/vixcloud', 'https://vixcloud.co');
                } else if (realVixcloudUrl.includes('http://localhost:8000/vixcloud')) {
                     realVixcloudUrl = realVixcloudUrl.replace('http://localhost:8000/vixcloud', 'https://vixcloud.co');
                } else if (realVixcloudUrl.includes(PROXY_URL + '/vixcloud')) {
                     realVixcloudUrl = realVixcloudUrl.replace(PROXY_URL + '/vixcloud', 'https://vixcloud.co');
                } else if (realVixcloudUrl.includes(window.location.origin + '/vixcloud')) {
                     realVixcloudUrl = realVixcloudUrl.replace(window.location.origin + '/vixcloud', 'https://vixcloud.co');
                }
                
                log(`Real Vixcloud URL: ${realVixcloudUrl}`);
                const iframe = document.createElement('iframe');
                iframe.src = realVixcloudUrl;
                iframe.allowFullscreen = true;
                playerContainer.appendChild(iframe);
                return;
            }

        } catch (err) {
            log(err.message, "error");
            console.error(err);
        }
    }
</script>

</body>
</html>
